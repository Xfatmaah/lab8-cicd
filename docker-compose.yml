services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=mongodb://db:27017
    depends_on:
      - db

  db:
    image: mongo:latest
    volumes:
      - ./init-db.js:/docker-entrypoint-initdb.d/init-db.js:ro
      - mongo_data:/data/db 

volumes:
  mongo_data: